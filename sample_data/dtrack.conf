# dtrack configuration
# Copy to your project directory and update values

# --- Oracle / PCDS credentials ---
PCDS_USR=myuser
PCDS_PWD=secret123
PB30_PWD=pb30pass
PB23_PWD=pb23pass
LDAP_DSN=ldap_prod_db

# --- Mock data paths (relative to this file) ---
DTRACK_ORACLE_MOCK=mock/oracle
DTRACK_ATHENA_MOCK=mock/athena

# --- Temp/staging credentials ---
TMP_USR=tmpuser
TMP_PWD=tmppass

# --- Sampling ---
N_SAMPLE=5
SEED=42

# --- AWS ---
AWS_DEFAULT_REGION=us-east-1
AWS_USR=aws_service_user
AWS_PWD=aws_secret
AWS_S3_WORK_GROUP=primary
AWS_S3_STAGING_DIR=s3://my-bucket/athena-staging/
AWS_TOKEN_URL=https://sso.example.com/oauth2/token
AWS_ARN_URL=arn:aws:iam::123456789012:role/AthenaQueryRole
AWS_HOST=athena.us-east-1.amazonaws.com

# --- Output ---
EMAIL_TO=team@example.com
SAS_LIB=MYLIB
OUT_DIR=./output

# --- Performance ---
MAX_COLS_PER_BATCH=50
ORACLE_PARALLEL=4
